{% extends "base.html" %}
{% block title %}Connexion - Super Student AI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Connexion</h1>
        <p class="subtitle">Connectez-vous pour accéder à votre espace personnel</p>

        <form method="POST" action="{{ url_for('login') }}" class="card-form auth-form">
            <div class="form-group">
                <label for="email">Adresse email *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="exemple@edu.ece.fr"
                    value="{{ email or '' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Votre mot de passe"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Se connecter
            </button>
        </form>

        <p class="auth-switch">
            Pas encore de compte ?
            <a href="{{ url_for('register') }}">Créer un compte</a>
        </p>
    </div>
</section>
{% endblock %}
